<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebTest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card" id="appCard">
        <h1>Voyager</h1>
        <div class="bio" id="bioText">
            Yo
        </div>

        <div class="counter-area">
            <span class="counter-label">Clicks:</span>
            <span class="counter-value" id="clickCounter">0</span>
        </div>
        <div class="btn-group">
            <button class="btn btn-primary" id="clickBtn">+ Increase</button>
            <button class="btn btn-secondary" id="resetBtn">↺ Reset</button>
        </div>
        <div class="footer-message" id="footerMessage">
        </div>
    </div>
    <script src="jsscript/shpack.js"></script>
</body>
</html>
